name: Horizon Summary

on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          path: '.'
          repository: 'Thysrael/Horizon'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: ./config

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Fetch Secrets from Infisical
        uses: infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          identity-id: "0083d8a1-eb42-4070-951e-c57c39fc683d"
          domain: "https://s1.6l.ink"
          project-slug: "horizon-ci-hv-1-p"
          env-slug: "prod"

      - name: Prepare run
        run: |
          mv config/.github/config.json ./data/config.json

      - name: Run Horizon
        run: uv run horizon --hours 24
